<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>OG — Nuwairi Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Reem Kufi', sans-serif;
    color: #1a1738;
    background:
      radial-gradient(ellipse 55% 45% at 22% 18%, rgba(244,208,107,0.22) 0%, rgba(244,208,107,0.06) 35%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 78% 85%, rgba(217,152,120,0.16) 0%, transparent 65%),
      radial-gradient(ellipse 60% 40% at 50% 45%, rgba(40,18,80,0.40) 0%, transparent 70%),
      #020207;
    position: relative;
  }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(2px 2px at 80px 100px, #fff, transparent),
      radial-gradient(1.5px 1.5px at 200px 280px, #ffe7a3, transparent),
      radial-gradient(2px 2px at 380px 70px, #fff, transparent),
      radial-gradient(1px 1px at 540px 180px, #ffe7a3, transparent),
      radial-gradient(1.5px 1.5px at 700px 130px, #fff, transparent),
      radial-gradient(2.5px 2.5px at 950px 270px, #fff8d8, transparent),
      radial-gradient(1.5px 1.5px at 1080px 90px, #ffe7a3, transparent),
      radial-gradient(1px 1px at 150px 470px, #fff, transparent),
      radial-gradient(2px 2px at 880px 430px, #fff8d8, transparent),
      radial-gradient(1px 1px at 480px 550px, #fff, transparent),
      radial-gradient(1.5px 1.5px at 1100px 510px, #fff, transparent),
      radial-gradient(1px 1px at 60px 580px, #fff, transparent),
      radial-gradient(1px 1px at 1140px 360px, #ffe7a3, transparent);
    opacity: 0.85;
  }

  .card {
    position: absolute;
    inset: 40px 60px;
    border-radius: 32px;
    background:
      radial-gradient(ellipse at 18% 8%, rgba(255,255,255,0.92) 0%, rgba(255,253,245,0.82) 55%, transparent 90%),
      radial-gradient(ellipse at 88% 92%, rgba(244,208,107,0.40) 0%, transparent 60%),
      linear-gradient(155deg, rgba(255,255,255,0.85) 0%, rgba(252,248,235,0.78) 45%, rgba(244,208,107,0.50) 100%);
    backdrop-filter: blur(28px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.78);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.98),
      inset 0 -1px 0 rgba(184,138,30,0.4),
      0 30px 80px rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 36px 70px;
    overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute;
    top: 0; left: 14%; right: 14%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.99), transparent);
  }
  .corner {
    position: absolute;
    width: 38px; height: 38px;
    border: 1.5px solid rgba(184, 138, 30, 0.55);
  }
  .corner.tl { top: 14px; right: 14px; border-left: none; border-bottom: none; border-top-right-radius: 10px; }
  .corner.tr { top: 14px; left: 14px;  border-right: none; border-bottom: none; border-top-left-radius: 10px; }
  .corner.bl { bottom: 14px; right: 14px; border-left: none; border-top: none; border-bottom-right-radius: 10px; }
  .corner.br { bottom: 14px; left: 14px;  border-right: none; border-top: none; border-bottom-left-radius: 10px; }

  .left {
    flex: 1;
    max-width: 560px;
    text-align: right;
    z-index: 2;
  }
  .from-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 7px;
    color: #4a4773;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .title {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: 64px;
    line-height: 1;
    background: linear-gradient(90deg, #8a6817 0%, #b88a1e 30%, #f4d06b 50%, #b88a1e 70%, #8a6817 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 22px;
    filter: drop-shadow(0 2px 6px rgba(184,138,30,0.3));
  }
  .verse {
    font-family: 'Amiri', serif;
    font-style: italic;
    font-size: 21px;
    color: #8a6817;
    margin-bottom: 24px;
    opacity: 0.95;
  }

  .pair {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
  }
  .pair .side {
    text-align: center;
    padding: 14px 10px;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(244,208,107,0.25) 100%);
    border: 1px solid rgba(184, 138, 30, 0.35);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
  }
  .pair .side .role {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 5px;
    color: #8a6817;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.85;
  }
  .pair .side .nm {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: 23px;
    line-height: 1.3;
    background: linear-gradient(180deg, #8a6817 0%, #b88a1e 50%, #8a6817 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .pair .joiner {
    width: 58px; height: 58px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: radial-gradient(circle at 35% 30%, #fff8d8 0%, #f4d06b 50%, #b88a1e 100%);
    border: 1.5px solid rgba(255,255,255,0.85);
    box-shadow: 0 4px 12px rgba(184, 138, 30, 0.4), 0 0 18px rgba(244,208,107,0.5);
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: 32px;
    color: #4a2c0a;
  }

  .meta {
    display: flex;
    gap: 22px;
    align-items: center;
    font-family: 'Reem Kufi', sans-serif;
  }
  .meta .chip {
    display: flex; align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(255,253,245,0.82) 0%, rgba(244,208,107,0.30) 100%);
    border: 1px solid rgba(184, 138, 30, 0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    color: #4a2c0a;
    font-size: 16px;
    font-weight: 600;
  }
  .meta .chip svg { width: 17px; height: 17px; fill: none; stroke: #4a2c0a; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

  /* Mandala (static) */
  .mandala {
    position: relative;
    width: 360px; height: 360px;
    z-index: 2;
    flex-shrink: 0;
  }
  .mandala-halo {
    position: absolute; inset: -40px;
    background: radial-gradient(circle, rgba(244,208,107,0.45) 0%, transparent 70%);
    filter: blur(20px);
  }
  .mandala svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .mandala-text {
    position: absolute;
    inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    color: #8a6817;
  }
  .mandala-text .id {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 5px;
    font-weight: 600;
    margin-bottom: 6px;
    opacity: 0.85;
  }
  .mandala-text .eid {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: 38px;
    line-height: 1;
    background: linear-gradient(180deg, #8a6817 0%, #b88a1e 35%, #f4d06b 65%, #b88a1e 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .mandala-text .hjri {
    font-family: 'Reem Kufi', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    opacity: 0.85;
    font-weight: 600;
  }
  .mandala-text .greg {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.75;
    margin-top: 4px;
  }

  .watermark {
    position: absolute;
    top: 22px; left: 30px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: #f4d06b;
    opacity: 0.75;
    z-index: 5;
    text-transform: uppercase;
  }
  .watermark .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #f4d06b;
    box-shadow: 0 0 10px #f4d06b;
    margin-right: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="watermark"><span class="dot"></span>WEDDING · 1447 H</div>

  <div class="card">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="left">
      <div class="from-label">دعوة زفاف</div>
      <h1 class="title">زفافٌ مبارك</h1>
      <div class="verse">وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً</div>

      <div class="pair">
        <div class="side">
          <div class="role">العَريس</div>
          <div class="nm">أبو عبيدة<br>النويري</div>
        </div>
        <div class="joiner">و</div>
        <div class="side">
          <div class="role">العَروس</div>
          <div class="nm">رميساء<br>تولا</div>
        </div>
      </div>

      <div class="meta">
        <div class="chip">
          <svg viewBox="0 0 24 24"><rect x="3.5" y="5.5" width="17" height="15" rx="2"/><line x1="3.5" y1="10" x2="20.5" y2="10"/><line x1="8" y1="3.5" x2="8" y2="7"/><line x1="16" y1="3.5" x2="16" y2="7"/></svg>
          <span>السبت ١٣ ذو الحجة ١٤٤٧</span>
        </div>
        <div class="chip">
          <svg viewBox="0 0 24 24"><path d="M 12 21 C 6 14 4 11 4 8 a 8 8 0 0 1 16 0 c 0 3 -2 6 -8 13 z"/><circle cx="12" cy="8" r="2.6"/></svg>
          <span>الحَواتة - الأندَلُس</span>
        </div>
      </div>
    </div>

    <div class="mandala">
      <div class="mandala-halo"></div>

      <svg viewBox="-100 -100 200 200" style="transform: rotate(0deg);">
        <circle cx="0" cy="0" r="88" fill="none" stroke="rgba(184,138,30,0.40)" stroke-width="0.5"/>
        <g fill="rgba(255,255,255,0.85)" stroke="rgba(184,138,30,0.75)" stroke-width="0.6">
          <circle cx="0" cy="-88" r="3.5"/>
          <circle cx="44" cy="-76.2" r="3.5"/>
          <circle cx="76.2" cy="-44" r="3.5"/>
          <circle cx="88" cy="0" r="3.5"/>
          <circle cx="76.2" cy="44" r="3.5"/>
          <circle cx="44" cy="76.2" r="3.5"/>
          <circle cx="0" cy="88" r="3.5"/>
          <circle cx="-44" cy="76.2" r="3.5"/>
          <circle cx="-76.2" cy="44" r="3.5"/>
          <circle cx="-88" cy="0" r="3.5"/>
          <circle cx="-76.2" cy="-44" r="3.5"/>
          <circle cx="-44" cy="-76.2" r="3.5"/>
        </g>
      </svg>

      <svg viewBox="-100 -100 200 200" style="transform: rotate(15deg);">
        <g fill="rgba(255,255,255,0.32)" stroke="rgba(212,169,58,0.85)" stroke-width="1.1">
          <g transform="rotate(0)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
          <g transform="rotate(30)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
          <g transform="rotate(60)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
          <g transform="rotate(90)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
          <g transform="rotate(120)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
          <g transform="rotate(150)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
          <g transform="rotate(180)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
          <g transform="rotate(210)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
          <g transform="rotate(240)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
          <g transform="rotate(270)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
          <g transform="rotate(300)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
          <g transform="rotate(330)"><ellipse cx="0" cy="-52" rx="9" ry="28"/></g>
        </g>
      </svg>

      <svg viewBox="-100 -100 200 200" style="transform: rotate(22deg);">
        <polygon points="58,0 41,41 0,58 -41,41 -58,0 -41,-41 0,-58 41,-41"
                 fill="rgba(255,255,255,0.42)" stroke="rgba(255,255,255,0.95)" stroke-width="1.4"/>
        <polygon points="42,0 29.7,29.7 0,42 -29.7,29.7 -42,0 -29.7,-29.7 0,-42 29.7,-29.7"
                 fill="none" stroke="rgba(184,138,30,0.7)" stroke-width="0.7"/>
      </svg>

      <svg viewBox="-100 -100 200 200" style="transform: rotate(7deg);">
        <g stroke="rgba(184,138,30,0.7)" stroke-width="0.8">
          <line x1="0" y1="-97" x2="0" y2="-92"/>
          <line x1="48.5" y1="-84" x2="46" y2="-79.7"/>
          <line x1="84" y1="-48.5" x2="79.7" y2="-46"/>
          <line x1="97" y1="0" x2="92" y2="0"/>
          <line x1="84" y1="48.5" x2="79.7" y2="46"/>
          <line x1="48.5" y1="84" x2="46" y2="79.7"/>
          <line x1="0" y1="97" x2="0" y2="92"/>
          <line x1="-48.5" y1="84" x2="-46" y2="79.7"/>
          <line x1="-84" y1="48.5" x2="-79.7" y2="46"/>
          <line x1="-97" y1="0" x2="-92" y2="0"/>
          <line x1="-84" y1="-48.5" x2="-79.7" y2="-46"/>
          <line x1="-48.5" y1="-84" x2="-46" y2="-79.7"/>
        </g>
      </svg>

      <div class="mandala-text">
        <div class="id">SAVE · THE · DATE</div>
        <div class="eid">السبت</div>
        <div class="hjri">١٣ ذو الحجة ١٤٤٧</div>
        <div class="greg">30 · MAY · 2026</div>
      </div>
    </div>
  </div>
</body>
</html>
