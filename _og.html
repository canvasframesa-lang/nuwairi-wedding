<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>OG — Nuwairi Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Reem Kufi', sans-serif;
    color: #1a1738;
    background:
      radial-gradient(ellipse 55% 45% at 22% 18%, rgba(244,208,107,0.22) 0%, rgba(244,208,107,0.06) 35%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 78% 85%, rgba(217,152,120,0.16) 0%, transparent 65%),
      radial-gradient(ellipse 60% 40% at 50% 45%, rgba(40,18,80,0.42) 0%, transparent 70%),
      #020207;
    position: relative;
  }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(2px 2px at 80px 100px, #fff, transparent),
      radial-gradient(1.5px 1.5px at 200px 280px, #ffe7a3, transparent),
      radial-gradient(2px 2px at 380px 70px, #fff, transparent),
      radial-gradient(1px 1px at 540px 180px, #ffe7a3, transparent),
      radial-gradient(1.5px 1.5px at 700px 130px, #fff, transparent),
      radial-gradient(2.5px 2.5px at 950px 270px, #fff8d8, transparent),
      radial-gradient(1.5px 1.5px at 1080px 90px, #ffe7a3, transparent),
      radial-gradient(1px 1px at 150px 470px, #fff, transparent),
      radial-gradient(2px 2px at 880px 430px, #fff8d8, transparent),
      radial-gradient(1px 1px at 480px 550px, #fff, transparent),
      radial-gradient(1.5px 1.5px at 1100px 510px, #fff, transparent),
      radial-gradient(1px 1px at 60px 580px, #fff, transparent),
      radial-gradient(1px 1px at 1140px 360px, #ffe7a3, transparent);
    opacity: 0.85;
  }

  .card {
    position: absolute;
    inset: 36px 56px;
    border-radius: 32px;
    background:
      radial-gradient(ellipse at 18% 8%, rgba(255,255,255,0.94) 0%, rgba(255,253,245,0.84) 55%, transparent 90%),
      radial-gradient(ellipse at 88% 92%, rgba(244,208,107,0.42) 0%, transparent 60%),
      linear-gradient(155deg, rgba(255,255,255,0.86) 0%, rgba(252,248,235,0.78) 45%, rgba(244,208,107,0.52) 100%);
    backdrop-filter: blur(28px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.78);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.98),
      inset 0 -1px 0 rgba(184,138,30,0.4),
      0 30px 80px rgba(0,0,0,0.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 60px;
    overflow: hidden;
    text-align: center;
  }
  .card::before {
    content: ''; position: absolute;
    top: 0; left: 14%; right: 14%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.99), transparent);
  }
  .card::after {
    content: ''; position: absolute;
    bottom: 0; left: 35%; right: 35%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(184,138,30,0.45), transparent);
  }
  .corner {
    position: absolute;
    width: 44px; height: 44px;
    border: 1.6px solid rgba(184, 138, 30, 0.55);
  }
  .corner.tl { top: 18px; right: 18px; border-left: none; border-bottom: none; border-top-right-radius: 12px; }
  .corner.tr { top: 18px; left: 18px;  border-right: none; border-bottom: none; border-top-left-radius: 12px; }
  .corner.bl { bottom: 18px; right: 18px; border-left: none; border-top: none; border-bottom-right-radius: 12px; }
  .corner.br { bottom: 18px; left: 18px;  border-right: none; border-top: none; border-bottom-left-radius: 12px; }

  /* Crown — small at top */
  .crown {
    width: 64px;
    margin-bottom: 8px;
    filter: drop-shadow(0 3px 8px rgba(184, 138, 30, 0.45));
  }

  .label {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 9px;
    color: #4a4773;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.9;
  }
  .label::before, .label::after {
    content: '✦';
    margin: 0 12px;
    color: #d4a93a;
    opacity: 0.65;
    font-size: 10px;
  }

  .families {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    margin-bottom: 16px;
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: 64px;
    line-height: 1;
  }
  .families .fam {
    background: linear-gradient(90deg, #8a6817 0%, #b88a1e 30%, #f4d06b 50%, #b88a1e 70%, #8a6817 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 6px rgba(184,138,30,0.3));
  }
  .families .amp {
    color: #d4a93a;
    font-size: 0.55em;
    filter: drop-shadow(0 0 10px #f4d06b);
    opacity: 0.9;
  }
  .verse {
    font-family: 'Amiri', serif;
    font-weight: 700;
    font-size: 26px;
    color: #8a6817;
    margin-bottom: 24px;
    opacity: 0.95;
  }

  /* The two names — stacked, each on ONE line, BIG and bold */
  .names {
    width: 100%;
    max-width: 1000px;
    margin: 2px auto 22px;
  }
  .name-row { text-align: center; }
  .name-row .role {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 7px;
    color: #8a6817;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.9;
  }
  .name-row .role::before, .name-row .role::after {
    content: '✦';
    margin: 0 10px;
    color: #d4a93a;
    opacity: 0.55;
    font-size: 9px;
  }
  .name-row .nm {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: 44px;
    line-height: 1.15;
    background: linear-gradient(180deg, #8a6817 0%, #b88a1e 30%, #f4d06b 55%, #b88a1e 80%, #8a6817 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 1px 3px rgba(184,138,30,0.4));
    white-space: nowrap;
  }

  /* Joiner — clean letter, NO sun, just a gold "و" between two thin lines */
  .joiner-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    margin: 14px 0;
  }
  .joiner-row .ln {
    width: 90px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d4a93a, transparent);
    opacity: 0.75;
  }
  .joiner-row .wj {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: 56px;
    line-height: 1;
    background: linear-gradient(180deg, #fff8d8 0%, #f4d06b 35%, #d4a93a 70%, #8a6817 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 1px 3px rgba(184,138,30,0.3));
  }

  /* Date + venue chips at bottom */
  .meta {
    display: flex;
    gap: 18px;
    align-items: center;
    justify-content: center;
    margin-top: 14px;
    font-family: 'Reem Kufi', sans-serif;
  }
  .meta .chip {
    display: flex; align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(255,253,245,0.85) 0%, rgba(244,208,107,0.32) 100%);
    border: 1px solid rgba(184, 138, 30, 0.42);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.92);
    color: #4a2c0a;
    font-size: 19px;
    font-weight: 600;
  }
  .meta .chip svg { width: 19px; height: 19px; fill: none; stroke: #4a2c0a; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

  .watermark {
    position: absolute;
    top: 22px; left: 30px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: #f4d06b;
    opacity: 0.75;
    z-index: 5;
    text-transform: uppercase;
  }
  .watermark .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #f4d06b;
    box-shadow: 0 0 10px #f4d06b;
    margin-right: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="watermark"><span class="dot"></span>WEDDING · 1447 H</div>

  <div class="card">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <!-- Crown -->
    <svg class="crown" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="crownGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%"  stop-color="#fff8d8"/>
          <stop offset="40%" stop-color="#f4d06b"/>
          <stop offset="75%" stop-color="#d4a93a"/>
          <stop offset="100%" stop-color="#8a6817"/>
        </linearGradient>
      </defs>
      <path d="M 18 42 L 102 42 L 96 52 L 24 52 Z" fill="url(#crownGrad)" stroke="#8a6817" stroke-width="0.6"/>
      <circle cx="36" cy="47" r="2" fill="#8a6817"/>
      <circle cx="60" cy="47" r="2.4" fill="#8a6817"/>
      <circle cx="84" cy="47" r="2" fill="#8a6817"/>
      <path d="M 18 42 L 22 22 L 30 42 Z" fill="url(#crownGrad)" stroke="#8a6817" stroke-width="0.5"/>
      <path d="M 32 42 L 42 14 L 52 42 Z" fill="url(#crownGrad)" stroke="#8a6817" stroke-width="0.5"/>
      <path d="M 52 42 L 60 4  L 68 42 Z" fill="url(#crownGrad)" stroke="#8a6817" stroke-width="0.5"/>
      <path d="M 68 42 L 78 14 L 88 42 Z" fill="url(#crownGrad)" stroke="#8a6817" stroke-width="0.5"/>
      <path d="M 90 42 L 98 22 L 102 42 Z" fill="url(#crownGrad)" stroke="#8a6817" stroke-width="0.5"/>
      <circle cx="22" cy="22" r="2.2" fill="#fff8d8" stroke="#8a6817" stroke-width="0.4"/>
      <circle cx="42" cy="14" r="2.6" fill="#fff8d8" stroke="#8a6817" stroke-width="0.4"/>
      <circle cx="60" cy="4"  r="3"   fill="#fff8d8" stroke="#8a6817" stroke-width="0.4"/>
      <circle cx="78" cy="14" r="2.6" fill="#fff8d8" stroke="#8a6817" stroke-width="0.4"/>
      <circle cx="98" cy="22" r="2.2" fill="#fff8d8" stroke="#8a6817" stroke-width="0.4"/>
    </svg>

    <div class="label">بِدَعوَةٍ مِن</div>
    <div class="families">
      <span class="fam">آلُ الشَّايِقي</span>
      <span class="amp">✦</span>
      <span class="fam">آلُ تولا</span>
    </div>
    <div class="verse">وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً</div>

    <div class="names">
      <div class="name-row">
        <div class="role">العَريس</div>
        <div class="nm">أبو عبيدة عبد المجيد محمد النويري</div>
      </div>

      <div class="joiner-row">
        <span class="ln"></span>
        <span class="wj">و</span>
        <span class="ln"></span>
      </div>

      <div class="name-row">
        <div class="role">العَروس</div>
        <div class="nm">رميساء أحمد حسن تولا</div>
      </div>
    </div>

    <div class="meta">
      <div class="chip">
        <svg viewBox="0 0 24 24"><rect x="3.5" y="5.5" width="17" height="15" rx="2"/><line x1="3.5" y1="10" x2="20.5" y2="10"/><line x1="8" y1="3.5" x2="8" y2="7"/><line x1="16" y1="3.5" x2="16" y2="7"/></svg>
        <span>السبت ١٣ ذو الحجة ١٤٤٧</span>
      </div>
      <div class="chip">
        <svg viewBox="0 0 24 24"><path d="M 12 21 C 6 14 4 11 4 8 a 8 8 0 0 1 16 0 c 0 3 -2 6 -8 13 z"/><circle cx="12" cy="8" r="2.6"/></svg>
        <span>الحَواتة - حي الأندَلُس</span>
      </div>
    </div>

  </div>
</body>
</html>
