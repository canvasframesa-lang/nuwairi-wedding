<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070914">
<meta name="robots" content="noindex,nofollow">
<title>لوحة تحكم العريس · زفاف أبو عبيدة ورميساء</title>

<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' fill='%23f4d56e'/></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Reem+Kufi:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --gold-hi:  #fff8d8;
    --gold-1:   #ffe7a3;
    --gold-2:   #f4d06b;
    --gold-3:   #d4a93a;
    --gold-4:   #b88a1e;
    --gold-5:   #8a6817;
    --gold-shim: linear-gradient(90deg, #8a6817 0%, #b88a1e 25%, #f4d06b 50%, #b88a1e 75%, #8a6817 100%);

    --ink:      #0a0a14;
    --ink-mute: #555568;
    --line:     rgba(184, 138, 30, 0.22);

    --green-1: #2da640;
    --green-2: #1e6e2a;
    --red-1:   #c72e48;
    --red-2:   #7a1830;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: #050714; min-height: 100vh; }
  body {
    color: var(--ink);
    font-family: 'Reem Kufi', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ============ cosmos background ============ */
  .cosmos {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 55% 45% at 22% 18%, rgba(244, 208, 107, 0.16) 0%, transparent 65%),
      radial-gradient(ellipse 50% 40% at 78% 85%, rgba(217, 152, 120, 0.12) 0%, transparent 65%),
      radial-gradient(ellipse 60% 40% at 50% 45%, rgba(40, 18, 80, 0.35) 0%, transparent 70%),
      #020207;
    pointer-events: none;
  }
  #dust { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  main {
    position: relative;
    z-index: 2;
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 18px 80px;
  }

  /* ============ shared frame card ============ */
  .frame {
    background:
      radial-gradient(ellipse at 18% 8%, rgba(255,255,255,0.85) 0%, rgba(255,253,245,0.75) 60%, transparent 95%),
      linear-gradient(155deg, rgba(255,255,255,0.78) 0%, rgba(252,248,235,0.7) 50%, rgba(244,208,107,0.32) 100%);
    backdrop-filter: blur(24px) saturate(1.3);
    -webkit-backdrop-filter: blur(24px) saturate(1.3);
    border: 1px solid rgba(255,255,255,0.6);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.9),
      inset 0 -1px 0 rgba(184,138,30,0.3),
      0 20px 50px rgba(0,0,0,0.55);
    border-radius: 24px;
    position: relative;
  }
  .frame::before {
    content: '';
    position: absolute;
    top: 0; left: 14%; right: 14%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.95), transparent);
    pointer-events: none;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0%   { background-position: 200% 50%; }
    100% { background-position: -200% 50%; }
  }

  /* ============ login ============ */
  .login {
    max-width: 440px;
    margin: 12vh auto 0;
    padding: 44px 32px 32px;
    text-align: center;
    animation: rise 0.7s cubic-bezier(.16,1,.3,1) both;
  }
  .login .crown {
    width: 60px; height: auto;
    margin: 0 auto 14px;
    display: block;
    filter: drop-shadow(0 3px 10px rgba(184,138,30,0.45));
  }
  .login h1 {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: clamp(22px, 5vw, 28px);
    line-height: 1.3;
    background: var(--gold-shim);
    background-size: 220% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 6s linear infinite;
    margin-bottom: 4px;
  }
  .login .sub {
    color: var(--gold-5);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 7px;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 28px;
  }
  .login input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid rgba(184, 138, 30, 0.4);
    background: rgba(255, 252, 240, 0.92);
    font-family: 'Reem Kufi', sans-serif;
    font-size: 16px;
    color: var(--ink);
    text-align: center;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: ltr;
    letter-spacing: 2px;
  }
  .login input:focus {
    border-color: var(--gold-3);
    box-shadow: 0 0 0 3px rgba(212,169,58,0.18);
  }
  .login button {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(180deg, #f4d06b 0%, #d4a93a 50%, #8a6817 100%);
    color: #2a1505;
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: 18px;
    cursor: pointer;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.55),
      0 8px 20px rgba(184, 138, 30, 0.4);
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .login button:hover {
    transform: translateY(-1px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 12px 26px rgba(184, 138, 30, 0.55);
  }
  .login button:disabled { opacity: 0.6; cursor: progress; }
  .login .err {
    margin-top: 14px;
    color: var(--red-1);
    font-size: 13px;
    min-height: 18px;
  }

  /* ============ dashboard ============ */
  .dashboard { animation: rise 0.6s cubic-bezier(.16,1,.3,1) both; }

  .header {
    padding: 26px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .header h1 {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: clamp(24px, 5vw, 34px);
    line-height: 1.2;
    background: var(--gold-shim);
    background-size: 220% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 6s linear infinite;
  }
  .header .sub {
    color: var(--gold-5);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 6px;
    opacity: 0.8;
  }
  .header .actions { display: flex; gap: 10px; align-items: center; }
  .btn-soft {
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid rgba(184, 138, 30, 0.45);
    background: rgba(255,253,245,0.85);
    color: var(--gold-5);
    font-family: 'Reem Kufi', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-soft:hover {
    background: rgba(255,253,245,1);
    transform: translateY(-1px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 4px 12px rgba(184,138,30,0.2);
  }
  .btn-soft.refreshing { opacity: 0.7; pointer-events: none; }
  .btn-soft.refreshing .ic { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============ stats — large, prominent ============ */
  .stats {
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 22px;
  }
  .stat {
    padding: 22px 18px;
    text-align: center;
    border-radius: 22px;
    background: rgba(255,253,245,0.85);
    border: 1px solid rgba(184, 138, 30, 0.32);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.92),
      0 8px 22px rgba(184, 138, 30, 0.15);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat:hover { transform: translateY(-2px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), 0 14px 30px rgba(184, 138, 30, 0.22); }
  .stat .lbl {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold-5);
    margin-bottom: 4px;
    opacity: 0.85;
  }
  .stat .ar {
    font-family: 'Reem Kufi', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 8px;
    opacity: 0.85;
  }
  .stat .v {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: clamp(40px, 9vw, 60px);
    line-height: 1;
    background: var(--gold-shim);
    background-size: 220% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 8s linear infinite;
    filter: drop-shadow(0 1px 2px rgba(184,138,30,0.25));
  }
  .stat.yes .v {
    background: linear-gradient(180deg, #2da640 0%, #1e6e2a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: none;
    filter: drop-shadow(0 1px 2px rgba(30, 110, 42, 0.3));
  }
  .stat.no .v {
    background: linear-gradient(180deg, #c72e48 0%, #7a1830 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: none;
    filter: drop-shadow(0 1px 2px rgba(122, 24, 48, 0.3));
  }
  .stat .ico {
    position: absolute;
    top: 12px; left: 14px;
    width: 22px; height: 22px;
    opacity: 0.3;
  }
  .stat .ico svg { width: 100%; height: 100%; }

  /* ============ filters bar ============ */
  .filters {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    margin: 0 4px 16px;
    padding: 10px 10px;
    border-radius: 999px;
    background: rgba(255,253,245,0.55);
    border: 1px solid rgba(184, 138, 30, 0.18);
  }
  .filters .chip {
    padding: 9px 18px;
    border-radius: 999px;
    border: none;
    background: transparent;
    color: var(--gold-5);
    font-family: 'Reem Kufi', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .filters .chip:hover { background: rgba(244, 208, 107, 0.18); }
  .filters .chip.active {
    background: linear-gradient(180deg, #f4d06b 0%, #d4a93a 100%);
    color: #2a1505;
    box-shadow: 0 4px 12px rgba(184, 138, 30, 0.3);
  }
  .filters .chip .count {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 999px;
    background: rgba(0,0,0,0.1);
    min-width: 18px;
    text-align: center;
  }
  .filters .chip.active .count { background: rgba(255,255,255,0.55); color: #2a1505; }
  .filters .search {
    flex: 1; min-width: 180px;
    padding: 9px 16px;
    border-radius: 999px;
    border: 1px solid rgba(184, 138, 30, 0.3);
    background: rgba(255,253,245,0.9);
    font-family: 'Reem Kufi', sans-serif;
    font-size: 14px;
    outline: none;
    color: var(--ink);
    direction: rtl;
    text-align: right;
    margin-right: 6px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .filters .search::placeholder { color: var(--ink-mute); opacity: 0.6; }
  .filters .search:focus { border-color: var(--gold-3); box-shadow: 0 0 0 3px rgba(212,169,58,0.18); }

  /* ============ list ============ */
  .list { display: flex; flex-direction: column; gap: 14px; }
  .row {
    padding: 22px 24px;
    border-radius: 20px;
    background: rgba(255,253,245,0.95);
    border: 1px solid rgba(184, 138, 30, 0.28);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.92),
      0 6px 18px rgba(184, 138, 30, 0.10);
    transition: transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: visible;
    direction: rtl;
  }
  .row::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 5px;
    border-radius: 0 20px 20px 0;
  }
  .row:hover {
    transform: translateY(-2px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), 0 12px 28px rgba(184, 138, 30, 0.2);
  }
  .row.yes::after { background: linear-gradient(180deg, #2da640 0%, #1e6e2a 100%); }
  .row.no::after  { background: linear-gradient(180deg, #c72e48 0%, #7a1830 100%); }

  .row .top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .row .name {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: clamp(20px, 4.6vw, 26px);
    color: var(--ink);
    line-height: 1.3;
    word-break: break-word;
    overflow-wrap: anywhere;
    flex: 1 1 auto;
    min-width: 0;
  }
  .row .badge {
    font-family: 'Reem Kufi', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    padding: 8px 18px;
    border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
    flex: 0 0 auto;
  }
  .row.yes .badge {
    background: linear-gradient(180deg, rgba(45, 166, 64, 0.18) 0%, rgba(45, 166, 64, 0.10) 100%);
    color: #1e6e2a;
    border: 1px solid rgba(45, 166, 64, 0.3);
  }
  .row.no  .badge {
    background: linear-gradient(180deg, rgba(199, 46, 72, 0.16) 0%, rgba(199, 46, 72, 0.08) 100%);
    color: #7a1830;
    border: 1px solid rgba(199, 46, 72, 0.3);
  }
  .row .msg {
    font-family: 'Amiri', serif;
    font-size: clamp(17px, 4.2vw, 21px);
    line-height: 2;
    color: var(--ink);
    padding: 14px 18px;
    margin: 0;
    background: rgba(244, 208, 107, 0.10);
    border-radius: 14px;
    border-right: 4px solid var(--gold-3);
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
    overflow: visible;
    max-width: none;
    max-height: none;
    text-overflow: clip;
    position: relative;
  }
  .row .msg::before {
    content: '“';
    position: absolute;
    top: -4px; right: 8px;
    font-family: 'Aref Ruqaa', serif;
    font-size: 36px;
    color: var(--gold-3);
    line-height: 1;
    opacity: 0.6;
  }
  .row .msg.empty {
    color: var(--ink-mute);
    font-style: italic;
    background: transparent;
    border-right: none;
    padding: 8px 0;
    opacity: 0.7;
  }
  .row .msg.empty::before { display: none; }
  .row .meta {
    margin-top: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-mute);
    letter-spacing: 0.5px;
    display: flex; gap: 16px; flex-wrap: wrap;
    opacity: 0.9;
    padding-top: 12px;
    border-top: 1px dashed rgba(184, 138, 30, 0.22);
  }
  .row .meta span { display: inline-flex; align-items: center; gap: 5px; }

  /* ============ empty state ============ */
  .empty-state {
    padding: 70px 24px;
    text-align: center;
    border-radius: 22px;
    background: rgba(255,253,245,0.5);
    border: 1px dashed rgba(184, 138, 30, 0.3);
  }
  .empty-state .eico {
    width: 64px; height: 64px;
    margin: 0 auto 18px;
    opacity: 0.7;
    filter: drop-shadow(0 3px 8px rgba(184,138,30,0.3));
  }
  .empty-state .ehead {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 700;
    font-size: clamp(20px, 4.5vw, 26px);
    background: var(--gold-shim);
    background-size: 220% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 6s linear infinite;
    margin-bottom: 8px;
  }
  .empty-state .esub {
    font-family: 'Amiri', serif;
    font-style: italic;
    color: var(--gold-5);
    font-size: 15px;
    line-height: 1.7;
    opacity: 0.9;
    max-width: 380px;
    margin: 0 auto;
  }
  .empty-state .esub a {
    color: var(--gold-4);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  @media (max-width: 640px) {
    main { padding: 22px 12px 60px; }
    .header { padding: 20px 18px; }
    .stats { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .stat { padding: 16px 8px; }
    .stat .v { font-size: clamp(34px, 11vw, 48px); }
    .stat .ar { font-size: 12px; }
    .filters .search { min-width: 100%; margin-top: 6px; }
    .row { padding: 18px 16px; }
    .row .msg { padding: 12px 14px; font-size: 17px; line-height: 1.9; }
    .row .top { gap: 10px; }
    .row .badge { font-size: 12px; padding: 6px 14px; }
  }
</style>
</head>
<body>

<div class="cosmos"></div>
<canvas id="dust"></canvas>

<main>
  <!-- LOGIN -->
  <div class="login frame" id="login">
    <svg class="crown" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="cg" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%"  stop-color="#fff8d8"/>
          <stop offset="40%" stop-color="#f4d06b"/>
          <stop offset="75%" stop-color="#d4a93a"/>
          <stop offset="100%" stop-color="#8a6817"/>
        </linearGradient>
      </defs>
      <path d="M 18 42 L 102 42 L 96 52 L 24 52 Z" fill="url(#cg)" stroke="#8a6817" stroke-width="0.6"/>
      <path d="M 18 42 L 22 22 L 30 42 Z" fill="url(#cg)" stroke="#8a6817" stroke-width="0.5"/>
      <path d="M 32 42 L 42 14 L 52 42 Z" fill="url(#cg)" stroke="#8a6817" stroke-width="0.5"/>
      <path d="M 52 42 L 60 4  L 68 42 Z" fill="url(#cg)" stroke="#8a6817" stroke-width="0.5"/>
      <path d="M 68 42 L 78 14 L 88 42 Z" fill="url(#cg)" stroke="#8a6817" stroke-width="0.5"/>
      <path d="M 90 42 L 98 22 L 102 42 Z" fill="url(#cg)" stroke="#8a6817" stroke-width="0.5"/>
      <circle cx="22" cy="22" r="2.2" fill="#fff8d8" stroke="#8a6817" stroke-width="0.4"/>
      <circle cx="42" cy="14" r="2.6" fill="#fff8d8" stroke="#8a6817" stroke-width="0.4"/>
      <circle cx="60" cy="4"  r="3"   fill="#fff8d8" stroke="#8a6817" stroke-width="0.4"/>
      <circle cx="78" cy="14" r="2.6" fill="#fff8d8" stroke="#8a6817" stroke-width="0.4"/>
      <circle cx="98" cy="22" r="2.2" fill="#fff8d8" stroke="#8a6817" stroke-width="0.4"/>
    </svg>
    <h1>لَوحَةُ تَحَكُّمِ العَريس</h1>
    <div class="sub">NUWAIRI · WEDDING</div>
    <input type="password" id="pass" placeholder="••••••••" autofocus>
    <button id="login-btn">دُخول</button>
    <div class="err" id="err"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard" hidden>
    <div class="frame header">
      <div>
        <h1>الرُّدودُ والرَّسائل</h1>
        <div class="sub">NUWAIRI · WEDDING · 1447 H</div>
      </div>
      <div class="actions">
        <button class="btn-soft" id="btn-refresh">
          <span class="ic">⟲</span>
          <span>تحديث</span>
        </button>
        <button class="btn-soft" id="btn-logout">خروج</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="lbl">Total</div>
        <div class="ar">الإجمالي</div>
        <div class="v" id="s-total">0</div>
      </div>
      <div class="stat yes">
        <div class="lbl">Attending</div>
        <div class="ar">سَيحضُرون</div>
        <div class="v" id="s-yes">0</div>
      </div>
      <div class="stat no">
        <div class="lbl">Apologies</div>
        <div class="ar">مُعتَذِرون</div>
        <div class="v" id="s-no">0</div>
      </div>
    </div>

    <div class="filters">
      <button class="chip active" data-filter="all">
        <span>الكُل</span>
        <span class="count" id="c-all">0</span>
      </button>
      <button class="chip" data-filter="yes">
        <span>سَيحضُرون</span>
        <span class="count" id="c-yes">0</span>
      </button>
      <button class="chip" data-filter="no">
        <span>مُعتَذِرون</span>
        <span class="count" id="c-no">0</span>
      </button>
      <input class="search" id="search" placeholder="🔍 بحث في الاسم أو الرسالة...">
    </div>

    <div class="list" id="list"></div>
  </div>
</main>

<script>
(function () {
  'use strict';

  const API = 'https://nuwairi-wedding-api.nuwairi-wedding.workers.dev/api/admin/rsvps';
  const SHARE_URL = 'https://canvasframesa-lang.github.io/nuwairi-wedding/';

  const $login = document.getElementById('login');
  const $dash  = document.getElementById('dashboard');
  const $pass  = document.getElementById('pass');
  const $btn   = document.getElementById('login-btn');
  const $err   = document.getElementById('err');
  const $list  = document.getElementById('list');
  const $search = document.getElementById('search');
  const $refresh = document.getElementById('btn-refresh');

  let allItems = [];
  let filter = 'all';
  let query = '';
  let authHeader = null;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtDate(ts) {
    const d = new Date(ts);
    try { return d.toLocaleString('ar', { dateStyle: 'medium', timeStyle: 'short' }); }
    catch { return d.toString(); }
  }
  function flagFor(country) {
    if (!country || country.length !== 2) return '';
    return country.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt(0))) + ' ' + country;
  }

  function emptyStateHTML(hasData) {
    if (hasData) {
      return `<div class="empty-state">
        <div class="ehead">لا توجد ردود تطابق البحث</div>
        <div class="esub">جرّب تغيير المرشّحات أو مسح البحث</div>
      </div>`;
    }
    return `<div class="empty-state">
      <svg class="eico" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="eg" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#fff8d8"/>
            <stop offset="100%" stop-color="#b88a1e"/>
          </linearGradient>
        </defs>
        <path d="M 32 8 L 38 26 L 56 26 L 42 38 L 48 56 L 32 46 L 16 56 L 22 38 L 8 26 L 26 26 Z"
              fill="url(#eg)" stroke="#8a6817" stroke-width="0.8"/>
      </svg>
      <div class="ehead">في انتظار أوّل رَدّ</div>
      <div class="esub">شارك رابط الدعوة على واتساب،<br>وستظهر هنا ردود الضيوف ورسائلهم لحظة وصولها.<br><br>
        <a href="${SHARE_URL}" target="_blank">${SHARE_URL}</a></div>
    </div>`;
  }

  function render() {
    let items = allItems;
    if (filter !== 'all') items = items.filter(r => r.attend === filter);
    if (query) {
      const q = query.toLowerCase();
      items = items.filter(r =>
        (r.name || '').toLowerCase().includes(q) ||
        (r.msg  || '').toLowerCase().includes(q));
    }
    if (!items.length) {
      $list.innerHTML = emptyStateHTML(allItems.length > 0);
      return;
    }
    $list.innerHTML = items.map(r => `
      <div class="row ${r.attend}">
        <div class="top">
          <div class="name">${esc(r.name)}</div>
          <div class="badge">${r.attend === 'yes' ? '✓ سَيحضُر' : '✕ مُعتَذِر'}</div>
        </div>
        <div class="msg ${r.msg ? '' : 'empty'}">${esc(r.msg) || '— بلا رسالة —'}</div>
        <div class="meta">
          <span>⏱ ${fmtDate(r.ts)}</span>
          ${r.country ? `<span>🌍 ${esc(flagFor(r.country))}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  function updateCounts(data) {
    document.getElementById('s-total').textContent = data.count;
    document.getElementById('s-yes').textContent   = data.yes;
    document.getElementById('s-no').textContent    = data.no;
    document.getElementById('c-all').textContent   = data.count;
    document.getElementById('c-yes').textContent   = data.yes;
    document.getElementById('c-no').textContent    = data.no;
  }

  async function fetchAll() {
    if (!authHeader) return;
    $refresh.classList.add('refreshing');
    try {
      const r = await fetch(API, { headers: { 'Authorization': authHeader }, cache: 'no-store' });
      if (r.status === 401) { logout(); $err.textContent = 'انتهت الجلسة، أعد الدخول'; return; }
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      allItems = data.items || [];
      updateCounts(data);
      render();
    } catch (e) {
      console.error(e);
      $list.innerHTML = `<div class="empty-state">
        <div class="ehead">خطأ في الاتصال</div>
        <div class="esub">${esc(e.message)}<br>اضغط «تحديث» للمحاولة مرّة أخرى</div>
      </div>`;
    } finally {
      $refresh.classList.remove('refreshing');
    }
  }

  async function login() {
    const pw = $pass.value.trim();
    if (!pw) { $err.textContent = 'أدخل كلمة السر'; return; }
    $btn.disabled = true; $err.textContent = '';
    const candidate = 'Basic ' + btoa('admin:' + pw);
    try {
      const r = await fetch(API, { headers: { 'Authorization': candidate }, cache: 'no-store' });
      if (r.status === 401) { $err.textContent = 'كلمة السر خاطئة'; $btn.disabled = false; return; }
      if (!r.ok) throw new Error('HTTP ' + r.status);
      authHeader = candidate;
      sessionStorage.setItem('nuwairi_admin_auth', authHeader);
      $login.hidden = true;
      $dash.hidden = false;
      const data = await r.json();
      allItems = data.items || [];
      updateCounts(data);
      render();
    } catch (e) {
      $err.textContent = 'تعذّر الاتصال بالخادم';
    } finally {
      $btn.disabled = false;
    }
  }

  function logout() {
    authHeader = null;
    sessionStorage.removeItem('nuwairi_admin_auth');
    $dash.hidden = true;
    $login.hidden = false;
    $pass.value = '';
    $pass.focus();
  }

  $btn.addEventListener('click', login);
  $pass.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
  $refresh.addEventListener('click', fetchAll);
  document.getElementById('btn-logout').addEventListener('click', logout);
  $search.addEventListener('input', (e) => { query = e.target.value.trim(); render(); });
  document.querySelectorAll('.filters .chip').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.filters .chip').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      filter = b.dataset.filter;
      render();
    });
  });

  // auto-refresh every 20s when dashboard visible
  setInterval(() => { if (!$dash.hidden && document.visibilityState === 'visible') fetchAll(); }, 20000);

  // restore session
  const saved = sessionStorage.getItem('nuwairi_admin_auth');
  if (saved) {
    authHeader = saved;
    $login.hidden = true;
    $dash.hidden = false;
    fetchAll();
  }

  /* ============ gold dust background ============ */
  const dust = document.getElementById('dust');
  const dctx = dust.getContext('2d');
  let particles = [];
  const dpr = Math.max(1, Math.min(2, devicePixelRatio || 1));
  function resize() {
    dust.width = innerWidth * dpr; dust.height = innerHeight * dpr;
    dust.style.width = innerWidth + 'px'; dust.style.height = innerHeight + 'px';
    dctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  function spawn() {
    particles.push({
      x: Math.random() * innerWidth,
      y: innerHeight + 10,
      r: 0.5 + Math.random() * 1.5,
      vy: -(0.2 + Math.random() * 0.5),
      a: 0, maxA: 0.15 + Math.random() * 0.35,
      life: 0, maxLife: 400 + Math.random() * 400,
      drift: Math.random() * Math.PI * 2, ds: 0.01 + Math.random() * 0.02
    });
  }
  function loop() {
    dctx.clearRect(0, 0, innerWidth, innerHeight);
    if (Math.random() < 0.25 && particles.length < 50) spawn();
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life++; p.drift += p.ds;
      p.x += Math.sin(p.drift) * 0.3; p.y += p.vy;
      if (p.life < 80) p.a = (p.life / 80) * p.maxA;
      else if (p.life > p.maxLife - 80) p.a = ((p.maxLife - p.life) / 80) * p.maxA;
      else p.a = p.maxA;
      if (p.life > p.maxLife || p.y < -10) { particles.splice(i, 1); continue; }
      dctx.beginPath();
      dctx.fillStyle = `rgba(244, 208, 107, ${p.a})`;
      dctx.shadowBlur = 8; dctx.shadowColor = `rgba(244, 208, 107, ${p.a * 0.8})`;
      dctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); dctx.fill();
      dctx.shadowBlur = 0;
    }
    requestAnimationFrame(loop);
  }
  addEventListener('resize', resize);
  resize(); loop();
})();
</script>
</body>
</html>
